<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goontube</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

header{
  padding:12px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

main{
  display:grid;
  grid-template-columns:300px 1fr;
  height:calc(100vh - 50px);
}

aside{
  padding:10px;
  border-right:1px solid #1e293b;
}

section{
  padding:10px;
  position:relative;
}

input,button{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:1px solid #334155;
  background:#020617;
  color:white;
}

.course{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border:1px solid #334155;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.deleteBtn{
  background:red;
  border:none;
  padding:4px 8px;
  cursor:pointer;
}

/* PLAYER */
#player{
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:10px;
}

/* PLAYLIST BUTTON */
.playlistBtn{
  position:absolute;
  top:15px;
  right:15px;
  background:#020617;
  border:1px solid #334155;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* PANEL */
.playlistPanel{
  position:absolute;
  top:50px;
  right:15px;
  width:260px;
  max-height:350px;
  overflow-y:auto;
  background:#020617;
  border:1px solid #334155;
  border-radius:10px;
  display:none;
}

.playlistItem{
  padding:8px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.playlistItem.active{
  background:#1e293b;
}
</style>
</head>

<body>

<header>Goontube</header>

<main>

<aside>
<input id="titleInput" placeholder="Course name">
<input id="urlInput" placeholder="Paste YouTube Playlist Link">
<button onclick="addCourse()">Add Playlist</button>

<div id="courses"></div>
</aside>

<section>

<div id="player"></div>

<div class="playlistBtn" onclick="togglePlaylist()">📂 Playlist</div>
<div id="playlistPanel" class="playlistPanel"></div>

</section>

</main>

<script>
let courses = JSON.parse(localStorage.getItem("courses") || "[]");
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

let player;
let currentCourse = null;

/* PLAYLIST ID */
function getPlaylistId(url){
  try{
    return new URL(url).searchParams.get("list");
  }catch{
    return null;
  }
}

/* ADD */
function addCourse(){
  let title = document.getElementById("titleInput").value.trim();
  let url = document.getElementById("urlInput").value.trim();

  let listId = getPlaylistId(url);

  if(!title || !listId){
    alert("Invalid input");
    return;
  }

  courses.push({title,listId});
  localStorage.setItem("courses", JSON.stringify(courses));
  render();
}

/* REMOVE */
function removeCourse(i){
  courses.splice(i,1);
  localStorage.setItem("courses", JSON.stringify(courses));
  render();
}

/* RENDER COURSES */
function render(){
  let box = document.getElementById("courses");
  box.innerHTML = "";

  courses.forEach((c,i)=>{
    let percent = progress[c.listId]?.percent || 0;

    let div = document.createElement("div");
    div.className = "course";

    div.innerHTML = `
      <span>${c.title} (${percent}%)</span>
      <button class="deleteBtn">X</button>
    `;

    div.onclick = ()=>openCourse(i);

    div.querySelector(".deleteBtn").onclick = (e)=>{
      e.stopPropagation();
      removeCourse(i);
    };

    box.appendChild(div);
  });
}

/* OPEN */
function openCourse(i){
  currentCourse = courses[i];

  player.loadPlaylist({
    list: currentCourse.listId,
    listType: "playlist"
  });

  setTimeout(renderPlaylistPanel, 1500);
}

/* TOGGLE PANEL */
function togglePlaylist(){
  let p = document.getElementById("playlistPanel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

/* RENDER PLAYLIST PANEL */
function renderPlaylistPanel(){
  if(!player) return;

  let panel = document.getElementById("playlistPanel");
  let list = player.getPlaylist();

  if(!list) return;

  panel.innerHTML = `<div style="padding:8px;font-weight:bold;">
    Videos: ${list.length}
  </div>`;

  list.forEach((vid,i)=>{
    let div = document.createElement("div");

    div.className = "playlistItem" +
      (i === player.getPlaylistIndex() ? " active" : "");

    div.innerText = "Video " + (i+1);

    div.onclick = ()=>{
      player.playVideoAt(i);
    };

    panel.appendChild(div);
  });
}

/* PROGRESS */
function updateProgress(){
  if(!player || !currentCourse) return;

  let index = player.getPlaylistIndex();
  let total = player.getPlaylist()?.length || 1;

  let percent = Math.floor((index / total) * 100);

  progress[currentCourse.listId] = {percent};
  localStorage.setItem("progress", JSON.stringify(progress));

  render();
  renderPlaylistPanel();
}

/* PLAYER READY */
function onYouTubeIframeAPIReady(){
  player = new YT.Player("player",{
    events:{
      onStateChange:()=>{
        updateProgress();
      }
    }
  });
}

render();
</script>

</body>
</html>
