<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button{
  padding:10px;
  width:100%;
}

#player{
  margin-top:20px;
  width:100%;
  aspect-ratio:16/9;
}
</style>
</head>

<body>

<h2>YouTube Playlist Player</h2>

<input
  id="url"
  placeholder="Paste YouTube Playlist URL"
/>

<button onclick="loadPlaylist()">
Load Playlist
</button>

<div id="player"></div>

<script>
let player;

function onYouTubeIframeAPIReady(){

  player = new YT.Player("player",{
    height:"500",
    width:"100%",
    videoId:"dQw4w9WgXcQ"
  });
}

function getPlaylistId(url){

  try{
    let u = new URL(url);
    return u.searchParams.get("list");
  }
  catch{
    return null;
  }
}

function loadPlaylist(){

  let url =
    document.getElementById("url").value;

  let listId =
    getPlaylistId(url);

  if(!listId){
    alert("Invalid Playlist URL");
    return;
  }

  player.loadPlaylist({
    list:listId,
    listType:"playlist"
  });
}
</script>

</body>
</html>
