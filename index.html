<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTube Pro</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb;}
main{display:grid;grid-template-columns:300px 1fr;height:100vh;}
aside{padding:12px;border-right:1px solid #1e293b;overflow:auto;}
section{padding:12px;position:relative;}

input,button{
 width:100%;padding:10px;margin-bottom:8px;
 border-radius:10px;border:1px solid #334155;
 background:#020617;color:white;
}

#player{width:100%;aspect-ratio:16/9;border-radius:12px;}

.playlistBtn{
 position:absolute;top:20px;right:20px;
 background:rgba(0,0,0,0.7);
 padding:8px 12px;border-radius:8px;cursor:pointer;
}

.panel{
 position:absolute;top:60px;right:20px;
 width:340px;max-height:450px;
 overflow-y:auto;background:#020617;
 border:1px solid #334155;border-radius:10px;
 display:none;
}

.item{
 display:flex;gap:10px;padding:8px;
 border-bottom:1px solid #1e293b;
 cursor:pointer;
}

.item img{width:100px;border-radius:6px;}
.item.active{background:#1e293b;}
</style>
</head>

<body>

<main>

<aside>
<input id="title" placeholder="Course name">
<input id="url" placeholder="Playlist URL">
<button onclick="addCourse()">Add</button>
<div id="courses"></div>
</aside>

<section>

<div id="player"></div>
<div class="playlistBtn" onclick="togglePanel()">📂 Playlist</div>
<div id="panel" class="panel"></div>

</section>

</main>

<script>
const API_KEY="YOUR_API_KEY_HERE";

let player;
let courses=JSON.parse(localStorage.getItem("studypro")||"[]");
let current=null;
let playlistData=[];

/* ADD COURSE */
function addCourse(){
 let title=titleInput.value.trim();
 let url=urlInput.value.trim();

 let listId;
 try{listId=new URL(url).searchParams.get("list");}catch{}

 if(!title||!listId)return alert("Invalid");

 courses.push({title,listId,video:0,time:0});
 localStorage.setItem("studypro",JSON.stringify(courses));
 renderCourses();
}

/* RENDER COURSES */
function renderCourses(){
 let box=document.getElementById("courses");
 box.innerHTML="";

 courses.forEach((c,i)=>{
  let d=document.createElement("div");
  d.innerText=c.title;
  d.style.padding="8px";
  d.style.border="1px solid #334155";
  d.style.marginBottom="8px";
  d.onclick=()=>openCourse(i);
  box.appendChild(d);
 });
}

/* OPEN */
async function openCourse(i){
 current=i;
 let c=courses[i];

 player.loadPlaylist({
  list:c.listId,
  index:c.video,
  startSeconds:c.time
 });

 playlistData = await fetchAllVideos(c.listId);
 renderPanel();
}

/* FETCH ALL (pagination) */
async function fetchAllVideos(listId){
 let items=[];
 let next="";

 do{
  let url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${listId}&key=${API_KEY}&pageToken=${next}`;
  let res=await fetch(url);
  let data=await res.json();

  items.push(...data.items);
  next=data.nextPageToken||"";
 }while(next);

 return items;
}

/* PANEL */
function togglePanel(){
 let p=document.getElementById("panel");
 p.style.display=p.style.display==="block"?"none":"block";
}

/* RENDER PANEL */
function renderPanel(){
 let panel=document.getElementById("panel");
 panel.innerHTML="";

 playlistData.forEach((v,i)=>{

  let id=v.snippet.resourceId.videoId;

  let div=document.createElement("div");
  div.className="item";

  div.innerHTML=`
    <img src="${v.snippet.thumbnails.medium.url}">
    <div>${v.snippet.title}</div>
  `;

  div.onclick=()=>{
    player.playVideoAt(i);
  };

  panel.appendChild(div);
 });
}

/* AUTO HIGHLIGHT + SAVE */
function updateActive(){
 if(current===null)return;

 let idx=player.getPlaylistIndex();
 let items=document.querySelectorAll(".item");

 items.forEach((el,i)=>{
  el.classList.toggle("active",i===idx);
 });

 /* auto scroll */
 let active=document.querySelector(".item.active");
 if(active) active.scrollIntoView({block:"center"});

 /* save progress */
 courses[current].video=idx;
 courses[current].time=Math.floor(player.getCurrentTime());
 localStorage.setItem("studypro",JSON.stringify(courses));
}

/* YT */
function onYouTubeIframeAPIReady(){
 player=new YT.Player("player",{
  events:{
   onStateChange:()=>{
    updateActive();
   }
  }
 });
}

renderCourses();
</script>

</body>
</html>
