<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Goontube</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://www.youtube.com/iframe_api"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

header{
  padding:14px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  font-size:20px;
  font-weight:bold;
}

main{
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 56px);
}

aside{
  padding:12px;
  border-right:1px solid #1e293b;
  overflow-y:auto;
}

section{
  padding:12px;
  position:relative;
}

input,
button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:white;
  font-size:15px;
}

button{
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.course{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:10px;
  border:1px solid #334155;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.course:hover{
  background:#111827;
}

.courseInfo{
  flex:1;
  overflow:hidden;
}

.courseTitle{
  font-weight:bold;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.courseProgress{
  font-size:13px;
  color:#94a3b8;
  margin-top:4px;
}

.deleteBtn{
  background:red;
  border:none;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  width:auto;
}

#player{
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:14px;
  overflow:hidden;
}

#speedDisplay{
  position:absolute;
  bottom:20px;
  right:20px;
  background:#020617;
  border:1px solid #334155;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
}

.playlistBtn{
  position:absolute;
  top:20px;
  right:20px;
  background:#020617;
  border:1px solid #334155;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  z-index:10;
}

.playlistPanel{
  position:absolute;
  top:65px;
  right:20px;
  width:280px;
  max-height:400px;
  overflow-y:auto;
  background:#020617;
  border:1px solid #334155;
  border-radius:12px;
  display:none;
  z-index:10;
}

.playlistItem{
  padding:10px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
  transition:0.2s;
}

.playlistItem:hover{
  background:#111827;
}

.playlistItem.active{
  background:#1e293b;
}

.empty{
  color:#94a3b8;
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<header>Goontube</header>

<main>

<aside>

<input id="titleInput" placeholder="Course name" />

<input
  id="urlInput"
  placeholder="Paste YouTube Playlist Link"
/>

<button onclick="addCourse()">Add Playlist</button>

<div id="courses"></div>

</aside>

<section>

<div id="player"></div>

<div id="speedDisplay">1x</div>

<div class="playlistBtn" onclick="togglePlaylist()">
📂 Playlist
</div>

<div id="playlistPanel" class="playlistPanel"></div>

</section>

</main>

<script>
let courses =
  JSON.parse(localStorage.getItem("courses") || "[]");

let progress =
  JSON.parse(localStorage.getItem("progress") || "{}");

let player;
let currentCourse = null;
let currentSpeed = 1;

/* BETTER PLAYLIST PARSER */
function getPlaylistId(input) {
  try {
    const url = new URL(input);

    const playlistId =
      url.searchParams.get("list");

    if (!playlistId) return null;

    return playlistId.trim();
  } catch {
    return null;
  }
}

/* ADD PLAYLIST */
function addCourse() {

  const title =
    document.getElementById("titleInput")
    .value
    .trim();

  const url =
    document.getElementById("urlInput")
    .value
    .trim();

  const listId = getPlaylistId(url);

  if (!title) {
    alert("Enter course name");
    return;
  }

  if (!listId) {
    alert("Invalid YouTube playlist link");
    return;
  }

  const alreadyExists =
    courses.some(c => c.listId === listId);

  if (alreadyExists) {
    alert("Playlist already added");
    return;
  }

  courses.push({
    title,
    listId
  });

  localStorage.setItem(
    "courses",
    JSON.stringify(courses)
  );

  document.getElementById("titleInput").value = "";
  document.getElementById("urlInput").value = "";

  render();
}

/* REMOVE */
function removeCourse(index) {

  const removed = courses[index];

  delete progress[removed.listId];

  localStorage.setItem(
    "progress",
    JSON.stringify(progress)
  );

  courses.splice(index, 1);

  localStorage.setItem(
    "courses",
    JSON.stringify(courses)
  );

  render();
}

/* RENDER */
function render() {

  const box =
    document.getElementById("courses");

  box.innerHTML = "";

  if (courses.length === 0) {
    box.innerHTML =
      `<div class="empty">
        No playlists added
      </div>`;
    return;
  }

  courses.forEach((course, index) => {

    const percent =
      progress[course.listId]?.percent || 0;

    const div =
      document.createElement("div");

    div.className = "course";

    div.innerHTML = `
      <div class="courseInfo">
        <div class="courseTitle">
          ${course.title}
        </div>

        <div class="courseProgress">
          Progress: ${percent}%
        </div>
      </div>

      <button class="deleteBtn">
        X
      </button>
    `;

    div.onclick = () => {
      openCourse(index);
    };

    div.querySelector(".deleteBtn")
      .onclick = (e) => {

      e.stopPropagation();

      removeCourse(index);
    };

    box.appendChild(div);
  });
}

/* OPEN PLAYLIST */
function openCourse(index) {

  currentCourse = courses[index];

  if (!player || !player.loadPlaylist) {
    alert("Player not ready yet");
    return;
  }

  player.loadPlaylist({
    listType: "playlist",
    list: currentCourse.listId,
    index: 0
  });

  currentSpeed = 1;

  setTimeout(() => {
    updateSpeedDisplay();
    renderPlaylistPanel();
  }, 2000);
}

/* TOGGLE PLAYLIST PANEL */
function togglePlaylist() {

  const panel =
    document.getElementById("playlistPanel");

  panel.style.display =
    panel.style.display === "block"
      ? "none"
      : "block";
}

/* RENDER PLAYLIST */
function renderPlaylistPanel() {

  if (!player) return;

  const panel =
    document.getElementById("playlistPanel");

  const playlist =
    player.getPlaylist();

  if (!playlist || playlist.length === 0) {
    panel.innerHTML =
      `<div class="empty">
        Playlist not loaded yet
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div style="
      padding:12px;
      font-weight:bold;
      border-bottom:1px solid #1e293b;
    ">
      Videos: ${playlist.length}
    </div>
  `;

  playlist.forEach((videoId, i) => {

    const div =
      document.createElement("div");

    div.className =
      "playlistItem" +
      (i === player.getPlaylistIndex()
        ? " active"
        : "");

    div.innerText =
      "Video " + (i + 1);

    div.onclick = () => {
      player.playVideoAt(i);
    };

    panel.appendChild(div);
  });
}

/* SPEED */
function updateSpeedDisplay() {

  document.getElementById(
    "speedDisplay"
  ).innerText =
    currentSpeed + "x";
}

function changeSpeed(direction) {

  if (!player) return;

  const rates =
    player.getAvailablePlaybackRates();

  let index =
    rates.indexOf(currentSpeed);

  if (index === -1) {
    index = 0;
  }

  const next =
    index + direction;

  if (next < 0 || next >= rates.length)
    return;

  currentSpeed = rates[next];

  player.setPlaybackRate(currentSpeed);

  updateSpeedDisplay();
}

/* KEYBOARD */
document.addEventListener("keydown", (e) => {

  if (e.target.tagName === "INPUT")
    return;

  if (e.shiftKey && e.key === ">") {
    changeSpeed(1);
  }

  else if (e.shiftKey && e.key === "<") {
    changeSpeed(-1);
  }

  else if (e.key === "0") {

    currentSpeed = 1;

    if (player) {
      player.setPlaybackRate(1);
    }

    updateSpeedDisplay();
  }
});

/* PROGRESS */
function updateProgress() {

  if (!player || !currentCourse)
    return;

  const index =
    player.getPlaylistIndex();

  const total =
    player.getPlaylist()?.length || 1;

  const percent =
    Math.floor(((index + 1) / total) * 100);

  progress[currentCourse.listId] = {
    percent
  };

  localStorage.setItem(
    "progress",
    JSON.stringify(progress)
  );

  render();
  renderPlaylistPanel();
}

/* YOUTUBE PLAYER */
function onYouTubeIframeAPIReady() {

  player = new YT.Player("player", {

    height: "100%",
    width: "100%",

    playerVars: {
      autoplay: 0,
      controls: 1,
      rel: 0,
      modestbranding: 1
    },

    events: {

      onReady: () => {
        console.log("Player Ready");
      },

      onStateChange: () => {
        updateProgress();
      }
    }
  });
}

render();
</script>

</body>
</html>
