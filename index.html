<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist Player</title>

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:500px;
  margin-top:20px;
  border:none;
}
</style>
</head>

<body>

<h2>YouTube Playlist Player</h2>

<input
  id="playlistInput"
  placeholder="Paste YouTube Playlist URL"
/>

<button onclick="playPlaylist()">
Play Playlist
</button>

<iframe
  id="player"
  allowfullscreen
></iframe>

<script>
function playPlaylist(){

  let url =
    document.getElementById("playlistInput").value;

  try{

    let parsed =
      new URL(url);

    let playlistId =
      parsed.searchParams.get("list");

    if(!playlistId){
      alert("Invalid playlist");
      return;
    }

    let embedUrl =
      "https://www.youtube.com/embed/videoseries?list="
      + playlistId;

    document.getElementById("player").src =
      embedUrl;

  }
  catch{
    alert("Invalid URL");
  }
}
</script>

</body>
</html>
