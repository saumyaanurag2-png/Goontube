<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Playlist Player</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.playerBox{
    margin-top:25px;
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="container">

<h1>YouTube Playlist Player</h1>

<input
    type="text"
    id="playlistUrl"
    placeholder="Paste YouTube Playlist URL"
/>

<button onclick="loadPlaylist()">
Play Playlist
</button>

<div class="playerBox">
    <iframe
        id="player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>

</div>

<script>
function loadPlaylist(){

    const input =
        document
        .getElementById("playlistUrl")
        .value
        .trim();

    if(input === ""){
        alert("Paste playlist URL");
        return;
    }

    let playlistId = null;

    try{

        const url = new URL(input);

        playlistId =
            url.searchParams.get("list");

    }catch(error){

        alert("Invalid URL");
        return;
    }

    if(!playlistId){

        alert("Playlist ID not found");
        return;
    }

    const embedUrl =
        "https://www.youtube.com/embed/videoseries?list="
        + playlistId;

    document
        .getElementById("player")
        .src = embedUrl;
}
</script>

</body>
</html>
